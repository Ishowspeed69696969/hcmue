<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tính điểm xét tuyển SPS 2026</title>

<link rel="stylesheet" href="style.css">

</head>



<body>


<div class="container">



<header class="hero">

<h1>🎓 Công cụ tính điểm xét tuyển 2026</h1>

<p>
ĐGNLCB + Học bạ 6 học kỳ
</p>


<div class="formula">

ĐXT = (0.5×ĐMC + 0.35×HB1 + 0.15×HB2)×3 + ĐƯT

</div>


</header>







<section class="card">


<h2>1. Chọn thông tin xét tuyển</h2>


<label>Trường</label>


<select id="school">

<option value="">
-- Chọn trường --
</option>


<option value="SPS">

Đại học Sư phạm TP.HCM (SPS)

</option>


<option value="SPT">

Phân hiệu Long An (SPT)

</option>


<option value="SPG">

Phân hiệu Gia Lai (SPG)

</option>


</select>






<label>Ngành</label>


<select id="major" disabled>

<option>

Chọn trường trước

</option>

</select>






<label>Tổ hợp xét tuyển</label>


<select id="combo" disabled>

<option>

Chọn ngành trước

</option>


</select>




</section>









<section class="card">


<h2>2. Nhập điểm</h2>


<div id="scoreArea">


<p>

Chưa chọn tổ hợp

</p>


</div>




</section>









<section class="card">


<h2>3. Thông tin ưu tiên</h2>



<label>

Khu vực

</label>


<select id="region">


<option value="0">

Không ưu tiên

</option>


<option value="0.75">

KV1 (+0.75)

</option>


<option value="0.5">

KV2-NT (+0.5)

</option>


<option value="0.25">

KV2 (+0.25)

</option>


</select>






<label>

Đối tượng

</label>


<select id="object">


<option value="0">

Không ưu tiên

</option>


<option value="2">

UT1 (+2.0)

</option>


<option value="1">

UT2 (+1.0)

</option>


</select>





<div id="priorityBox">

Điểm ưu tiên gốc:
0

</div>




</section>









<button id="calculateBtn">

TÍNH ĐIỂM XÉT TUYỂN

</button>







<div id="result" class="result hidden">


</div>







<section class="card">


<h2>Chi tiết</h2>


<div id="detail">

Chưa có

</div>


</section>





</div>





<script src="script.js"></script>


</body>

</html>
